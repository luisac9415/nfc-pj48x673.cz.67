<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación de Boda</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-image: url('invitacionfoto.jpg'); 
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: #f4f4f4;
      text-align: center;
      padding: 40px;
      min-height: 100vh;
    }
    h1 {
      color: #a0522d;
    }
    .button {
      display: inline-block;
      margin: 20px;
      padding: 15px 25px;
      font-size: 18px;
      color: white;
      background-color: #d2691e;
      border: none;
      border-radius: 8px;
      text-decoration: none;
    }
    .button:hover {
      background-color: #b45f1c;
    }
    .button-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }
    .button-row {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>¡Nos casamos! 💕</h1>
  <p>Selecciona lo que deseas ver:</p>

  <div class="button-container">
    <a href="https://www.canva.com/design/DAGsws8V4SI/O34LJBNX1ObDBaLJeOEovQ/edit?utm_content=DAGsws8V4SI&utm_campaign=designshare&utm_medium=link2&utm_source=sharebutton" class="button">Ver Invitación</a>
    <a href="https://maps.app.goo.gl/tEyqoWrg2e8N7kRz7" class="button">Ver Ubicación</a>
  </div>

  <div class="button-row">
    <a href="#" class="button">Nuestra Historia</a>
  </div>
</body>
</html>
